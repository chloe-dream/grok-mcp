name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: dotnet test
        shell: pwsh
        run: dotnet test tests/GrokMcp.Tests/GrokMcp.Tests.csproj -c Release --logger "console;verbosity=normal"

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" >> $env:GITHUB_PATH

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace '^refs/tags/v?', ''
          echo "value=$tag" >> $env:GITHUB_OUTPUT
          echo "Version: $tag"

      - name: Build installer
        shell: pwsh
        run: |
          powershell.exe -ExecutionPolicy Bypass -File installer\build-installer.ps1 -AppVersion ${{ steps.version.outputs.value }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrokMcpSetup-${{ steps.version.outputs.value }}-win-x64
          path: bin/installer/GrokMcpSetup-*.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/installer/GrokMcpSetup-*.exe
          generate_release_notes: true
